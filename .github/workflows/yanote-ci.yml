name: yanote-ci

on:
  pull_request:
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run JVM tests
        run: ./gradlew test

      - name: Run analyzer tests
        run: npm -C yanote-js ci && npm -C yanote-js test

  yanote-validation:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run Yanote Gradle check contract path
        run: ./gradlew :yanote-gradle-plugin:test --tests "*YanoteTaskExecutionContractTest*yanoteCheck*"
