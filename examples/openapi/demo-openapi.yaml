openapi: 3.0.0
info:
  title: yanote demo api
  version: 1.0.0
paths:
  /users:
    get:
      responses:
        '200':
          description: users list
    post:
      responses:
        '201':
          description: user created
  /users/{id}:
    get:
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: user details
  /admin/ping:
    get:
      responses:
        '200':
          description: admin ping
