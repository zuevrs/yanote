services:
  api:
    image: eclipse-temurin:21-jdk
    container_name: yanote-demo-api
    working_dir: /workspace-api
    volumes:
      - ../:/workspace-api
      - yanote-events:/data/yanote
      - gradle-cache:/data/gradle
    command: sh -c './gradlew --no-daemon -g /data/gradle --project-cache-dir /data/gradle/project-cache :examples:springmvc-service:bootJar && java -Dyanote.recorder.events-path=/data/yanote/events.jsonl -Dyanote.recorder.enabled=true -jar examples/springmvc-service/build/libs/*.jar'
    environment:
      YANOTE_EVENTS_PATH: /data/yanote/events.jsonl
    ports:
      - '8080:8080'

  tests:
    image: eclipse-temurin:21-jdk
    container_name: yanote-demo-tests
    depends_on:
      - api
    working_dir: /workspace-tests
    volumes:
      - ../:/workspace-tests
      - yanote-events:/data/yanote
      - gradle-cache:/data/gradle
    environment:
      YANOTE_RUN_ID: compose-run-1
      YANOTE_SUITE: restassured-suite
      YANOTE_BASE_URI: http://api:8080
      YANOTE_EVENTS_PATH: /data/yanote/events.jsonl
      YANOTE_READY_MARKER: /data/yanote/tests-done.marker
      YANOTE_REPORT_MARKER: /data/yanote/report-done.marker
    command: >
      sh -c '
        set -e;
        for i in $(seq 1 180); do
          if curl -fsS "$${YANOTE_BASE_URI}/health" >/dev/null; then
            break;
          fi;
          sleep 2;
        done;
        ./gradlew --no-daemon -g /data/gradle --project-cache-dir /data/gradle/project-cache :examples:tests-restassured:test;
        echo "done" > "$${YANOTE_READY_MARKER}";
        found=0;
        for i in $(seq 1 180); do
          if test -f "$${YANOTE_REPORT_MARKER}"; then
            found=1;
            break;
          fi;
          sleep 2;
        done;
        if test "$${found}" -ne 1; then
          echo "ERROR: report marker not found at $${YANOTE_REPORT_MARKER}";
          exit 1;
        fi;
      '

  report:
    image: node:22
    container_name: yanote-demo-report
    depends_on:
      - tests
    working_dir: /workspace
    volumes:
      - ../:/workspace
      - yanote-events:/data/yanote
    environment:
      YANOTE_READY_MARKER: /data/yanote/tests-done.marker
      YANOTE_REPORT_MARKER: /data/yanote/report-done.marker
    command: >
      sh -c '
        set -e;
        cd /workspace;
        found=0;
        for i in $(seq 1 180); do
          if test -f "$${YANOTE_READY_MARKER}"; then
            found=1;
            break;
          fi;
          sleep 2;
        done;
        if test "$${found}" -ne 1; then
          echo "ERROR: tests marker not found at $${YANOTE_READY_MARKER}";
          exit 1;
        fi;
        npm -C yanote-js install;
        npm -C yanote-js run build;
        node yanote-js/dist/yanote.cjs report --spec /workspace/examples/openapi/demo-openapi.yaml --events /data/yanote/events.jsonl --out /data/yanote/out --min-coverage 100 --exclude /health;
        echo "Generated report:";
        cat /data/yanote/out/yanote-report.json;
        echo "done" > "$${YANOTE_REPORT_MARKER}";
      '

volumes:
  yanote-events:
  gradle-cache:
